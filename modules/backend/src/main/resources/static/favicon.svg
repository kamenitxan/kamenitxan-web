<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#2a323c"/>
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.15"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Border accent -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <!-- Letter K -->
  <text x="32" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="38" font-weight="700"
        text-anchor="middle" fill="url(#grad)">K</text>
</svg>

